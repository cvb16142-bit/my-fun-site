<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мурино - 3D Хоррор</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            background-color: #000;
        }

        /* Стиль главного меню */
        #main-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        #menu-title {
            color: #8b0000;
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
            animation: pulse 2s infinite alternate;
        }

        #menu-subtitle {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 50px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #8b0000;
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        .btn:hover {
            background: #8b0000;
            box-shadow: 0 0 25px #ff0000;
            text-shadow: 0 0 5px #fff;
        }

        /* Игровой интерфейс (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            z-index: 5;
            display: none;
            pointer-events: none;
        }

        #hp-bar-container {
            width: 200px;
            height: 20px;
            background-color: #333;
            border: 2px solid #fff;
            margin-top: 5px;
        }

        #hp-bar {
            width: 100%;
            height: 100%;
            background-color: #ff0000;
            transition: width 0.2s ease;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: none;
        }

        /* Экраны конца игры */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 15;
            color: #fff;
        }

        #game-over-title {
            color: #ff0000;
            font-size: 64px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #000;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            color: #555;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 30px #ff0000, 0 0 40px #ff0000; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="main-menu">
        <div id="menu-title">МУРИНО</div>
        <div id="menu-subtitle">Игрок: Меллострой | Монстр: Фог</div>
        <button class="btn" id="start-btn">ИГРАТЬ</button>
        <div id="controls-hint">Управление: WASD — ходить | Мышка — обзор (клик на экран)<br>Задача: собирать яблоки и выживать в заброшенном городе от Фога</div>
    </div>

    <div id="hud">
        <div>Игрок: Меллострой</div>
        <div style="margin-top: 10px;">Здоровье: <span id="hp-text">100</span>%</div>
        <div id="hp-bar-container">
            <div id="hp-bar"></div>
        </div>
        <div style="margin-top: 10px; font-size: 14px; color: #aaa;">Собрано яблок: <span id="score-text">0</span></div>
    </div>
    <div id="crosshair"></div>

    <div id="game-over-screen" class="screen">
        <h1 id="game-over-title">ФОГ ТЕБЯ НАСТИГ</h1>
        <p style="font-size: 20px; margin-bottom: 30px;">Меллострой не выжил в Мурино...</p>
        <button class="btn" id="restart-btn">ПОПРОБОВАТЬ СНОВА</button>
    </div>

    <script>
        // --- Аудио файлы из запроса ---
        const menuMusic = new Audio('https://www.myinstants.com/ru/instant/fog-7482/');
        menuMusic.loop = true;
        menuMusic.volume = 0.6;

        const amAmSound = new Audio('https://www.myinstants.com/ru/instant/am-am-am-17903/');
        const fogGrowl = new Audio('https://www.myinstants.com/ru/instant/rychanie-monstra-23449/');
        fogGrowl.loop = true;
        fogGrowl.volume = 0.8;

        // Встроенная картинка вашего Фога (Base64) для мгновенной загрузки
        const fogImageBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADwCAMAAACw899vAAAAclBMVEUAAAD////7+/v09PT39/ft7e3k5OTm5ubw8PDj4+Pg4ODr6+vV1dXz8/PZ2dnJycnGxsbS0tLc3NzNzc3Pz8/KysrDw8O9vb26urqsrKypqamgoKCdnZ14eHh0dHRgYGBXV1dNTU1JSUlERERFRUVCQkI7U0pRAAAEd0lEQVR4nO3d63qqMBSG4RsERUEE5SgIetvO/382KyI9pSbtgCg6w7Ofv9bMm5A8mY0mIUkAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAYIatbyXNo+FwNBoxmU6f+8/N5S48uBf0AWeHh9v8w0yXW9N669X58en8wX1ErzXv7wR9wP7w/ZgL9e8x/y80m/N2f9wP9X6C/uXwWJ7Z5/pQO6u+mN8b98V1X9CPXJvSNo+w/KzGttS5R1y3D30Fv3S2fWfTq+U7e9o7GfeL+0U6XvK6xNWy5Kvl9+I9UbeHfkTf2T+9Wq7W96b3Xq6u6FvT7Uve/7W6w5P7S33EfsFvFv59Ie83L/75v/8L3t8P8B6Nfbyw76u/vfeZ/Vz7P5veT5YfH/R7XN3W9S3b+pZtfcs2F+o8mO5I6Uv6D6Y6U8W0vGfX99r1vXe6qG9N39pMv2u/Zf6m/e6T3vT0+G0389vjfrX+KjZ4L3S3F9P6uL0Z6T7Eft76F53fvv9y8w/p2/f1pC3vS/3R/sX9P6I3v7rW+n6R9T1b30/Wp6p9bFfeM8vPr/8P9pP1T+O3N7v+7wT7+6p++6r+sOf7w9gfpf/w062fI9ofgLptH/pOf9R3+qO+07+T6O7579V/70h9XyH7L5P+7P5D6N/P4v1P6t/E7f3w+P5C2pZt/v9jO6r9wZ/uX3fUfXvj/iL7p236n7f8SfeLdf/8S77N/mFdf9ObeC9pL2v6Pof1X8O/X8W+Z/Vf7rR+T35/G/0bU/6v6t/Msn9w1p9N8zex3M8s+xtq9m9XfVb6R/f8D298L7e/3Pbe2pZtX7Yf21G+P239wX38jO/vSfpXvvyvBf2pP79Hn/8P+tN3V8r/72T9T/X+NvvvLftHtfydbL9X/Y9S/S263F/Q/I1of/3Z37H2t9b8bXf9U9Kftv6Zon/bMvvvdfvn9P67bv7Ovf3p9N/B7b/L8pff+u/N7Z/L/E0v++drf4vO/x3b/iXN3zbyN9D8bTv/d2X/fE3/+wX86w/99Xv8zN6/C+vfe/Svv7Sfe3wvuP/4vS/oM7u6I++pZfeE6v6E58+O+r6Pfe9B6q872Odu8veZ+msc77y/bT6b3XN9m9pX8l7S9Z++9r3Y5+z6NqZ8e6G07zV53/N539PyvaS07+z8rPz0ve789C1W06ftb13aZ7K/66F9j9P+ro32PXLfLpXvY6p/p8TfGvOfDfa3v+O3v23nb+3w7W/b+VuofFvnZ/z2bZH6W2S+rfNtkfoGzd8Wqb9B8rdF6p9D6p9D6p8Tqd++9W8L+dsit8/M/W2R2mfa9S2UvynP9/GzvzF8+5vOtz+Dvn1S2uE7P9vOn1XbX7W0D6e1feC3D+C3feC3TfD+Z4vwt6nzt02C9zdbwG9L+9vC+W8736Y2Zf/Mwv6B3XwG3pXNfM7UPhg7fI/8g877YNL6b/Hw7Tvepva6+RzeT9f+TsvfW+6f4v7+fvv9pva3bMtf2v9H/S/f8pf29+v/B85+FfD7pX7DAAAAAElFTkSuQmCC";

        // --- Инициализация Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.15); // Настоящий густой туман

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x0a0a0a);
        scene.add(ambientLight);

        // Фонарик игрока (Меллостроя)
        const flashlight = new THREE.SpotLight(0xfff0dd, 2, 40, Math.PI / 5, 0.5, 1);
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);

        // --- Логика игры и Переменные ---
        let gameActive = false;
        let hp = 100;
        let score = 0;
        const speed = 0.12;
        
        // Управление клавиатурой
        const keys = { w: false, a: false, s: false, d: false };
        
        // Поворот камеры мышкой
        let moveX = 0, moveY = 0;
        const mouseSensitivity = 0.002;

        // Позиция игрока в мире
        const player = {
            pos: new THREE.Vector3(0, 2, 0),
            rot: new THREE.Vector3(0, 0, 0)
        };

        // Списки объектов
        const walls = [];
        const apples = [];
        
        // Данные монстра (Фог)
        const fogMonster = {
            mesh: null,
            pos: new THREE.Vector3(30, 0, 30),
            speed: 0.075,
            width: 3,
            height: 6
        };

        // --- Генерация карты: Заброшенный город (Мурино) ---
        
        // Асфальт / Земля
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Функция создания жутких заброшенных многоэтажек Мурино
        function createBuilding(x, z, w, h, d) {
            const geo = new THREE.BoxGeometry(w, h, d);
            // Серый бетонный цвет домов
            const mat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, roughness: 0.8 });
            const building = new THREE.Mesh(geo, mat);
            building.position.set(x, h / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            
            // Записываем границы для коллизий (физики)
            walls.push({
                minX: x - w/2 - 0.8,
                maxX: x + w/2 + 0.8,
                minZ: z - d/2 - 0.8,
                maxZ: z + d/2 + 0.8
            });
        }

        // Строим лабиринт из питерских застроек
        createBuilding(-20, -20, 15, 40, 15);
        createBuilding(20, -20, 12, 35, 20);
        createBuilding(-25, 25, 18, 50, 12);
        createBuilding(25, 25, 15, 30, 15);
        createBuilding(0, -45, 30, 45, 10);
        createBuilding(0, 45, 40, 40, 12);
        createBuilding(-45, 0, 12, 35, 30);
        createBuilding(44, 0, 10, 55, 25);
        
        // Границы карты (чтобы игрок не убежал в бесконечность)
        walls.push({ minX: -95, maxX: -90, minZ: -100, maxZ: 100 });
        walls.push({ minX: 90, maxX: 95, minZ: -100, maxZ: 100 });
        walls.push({ minX: -100, maxX: 100, minZ: -95, maxZ: -90 });
        walls.push({ minX: -100, maxX: 100, minZ: 90, maxZ: 95 });

        // --- Создание Яблок ---
        const appleGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const appleMat = new THREE.MeshStandardMaterial({ color: 0xff0033, roughness: 0.3, emissive: 0x330000 });

        function spawnApple(x, z) {
            const mesh = new THREE.Mesh(appleGeo, appleMat);
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            apples.push(mesh);
        }

        // Раскидываем яблоки по городу
        const applePositions = [
            {x: -5, z: -10}, {x: 10, z: -5}, {x: -15, z: 10}, {x: 5, z: 15},
            {x: -35, z: -20}, {x: 35, z: -30}, {x: -35, z: 35}, {x: 35, z: 10},
            {x: 0, z: -25}, {x: -10, z: -35}, {x: 20, z: 5}, {x: -5, z: 35}
        ];
        applePositions.forEach(p => spawnApple(p.x, p.z));

        // --- Создание Монстра (Фог) ---
        // Создаем спрайт (плоский объект, который всегда повернут к камере face-to-face)
        const loader = new THREE.TextureLoader();
        const monsterTexture = loader.load(fogImageBase64);
        const monsterMat = new THREE.SpriteMaterial({ map: monsterTexture, fog: true });
        fogMonster.mesh = new THREE.Sprite(monsterMat);
        fogMonster.mesh.scale.set(fogMonster.width, fogMonster.height, 1);
        fogMonster.mesh.position.set(fogMonster.pos.x, fogMonster.height / 2, fogMonster.pos.z);
        scene.add(fogMonster.mesh);

        // --- Интеракция и управление (Pointer Lock) ---
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const mainMenu = document.getElementById('main-menu');
        const gameOverScreen = document.getElementById('game-over-screen');
        const hud = document.getElementById('hud');
        const crosshair = document.getElementById('crosshair');

        // Клик по кнопке "Играть"
        startBtn.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        // Клик по кнопке "Перезапуск"
        restartBtn.addEventListener('click', () => {
            resetGame();
            document.body.requestPointerLock();
        });

        // Следим за состоянием мыши (захвачена или нет)
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                // Игра активна
                mainMenu.style.opacity = '0';
                setTimeout(() => mainMenu.style.display = 'none', 1000);
                gameOverScreen.style.display = 'none';
                hud.style.display = 'block';
                crosshair.style.display = 'block';
                gameActive = true;
                
                // Включаем звуки
                menuMusic.pause();
                fogGrowl.play().catch(()=>{});
            } else {
                // Игра на паузе или закончилась
                if (hp > 0) {
                    mainMenu.style.display = 'flex';
                    mainMenu.style.opacity = '1';
                    menuMusic.play().catch(()=>{});
                    fogGrowl.pause();
                    gameActive = false;
                }
            }
        });

        // Обработка движений мыши
        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            player.rot.y -= e.movementX * mouseSensitivity;
            player.rot.x -= e.movementY * mouseSensitivity;
            
            // Ограничение взгляда вверх/вниз
            player.rot.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, player.rot.x));
        });

        // Нажатия клавиш WASD
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // --- Функция Сброса / Старта игры ---
        function resetGame() {
            hp = 100;
            score = 0;
            document.getElementById('hp-text').innerText = hp;
            document.getElementById('hp-bar').style.width = '100%';
            document.getElementById('score-text').innerText = score;

            player.pos.set(0, 2, 0);
            player.rot.set(0, 0, 0);
            
            fogMonster.pos.set(40, 0, 40);
            fogMonster.mesh.position.set(40, fogMonster.height / 2, 40);

            // Возвращаем собранные яблоки на карту
            apples.forEach(apple => {
                if(!scene.children.includes(apple)) scene.add(apple);
            });
        }

        // Включаем музыку в меню при первом клике по экрану (требование браузеров)
        window.addEventListener('click', () => {
            if(!gameActive && hp > 0) {
                menuMusic.play().catch(()=>{});
            }
        }, { once: true });


        // --- Главный Цикл Игры (Логика и Рендеринг) ---
        const clock = new THREE.Clock();

        function update() {
            requestAnimationFrame(update);

            if (!gameActive) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // 1. Движение Игрока (Меллостроя)
            const changePos = new THREE.Vector3();
            if (keys.w) changePos.z -= speed;
            if (keys.s) changePos.z += speed;
            if (keys.a) changePos.x -= speed;
            if (keys.d) changePos.x += speed;

            // Поворачиваем вектор движения относительно взгляда игрока
            changePos.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rot.y);
            
            // Проверка столкновений со стенами домов перед шагом
            const targetX = player.pos.x + changePos.x;
            const targetZ = player.pos.z + changePos.z;
            let collisionX = false;
            let collisionZ = false;

            for (let wall of walls) {
                if (targetX > wall.minX && targetX < wall.maxX && player.pos.z > wall.minZ && player.pos.z < wall.maxZ) {
                    collisionX = true;
                }
                if (player.pos.x > wall.minX && player.pos.x < wall.maxX && targetZ > wall.minZ && targetZ < wall.maxZ) {
                    collisionZ = true;
                }
            }

            if (!collisionX) player.pos.x = targetX;
            if (!collisionZ) player.pos.z = targetZ;

            // Обновляем камеру
            camera.position.copy(player.pos);
            camera.rotation.set(0, 0, 0);
            camera.rotation.y = player.rot.y;
            camera.rotation.x = player.rot.x;

            // Фонарик следует за камерой
            flashlight.position.copy(player.pos);
            const targetPosition = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(player.pos);
            flashlight.target.position.copy(targetPosition);

            // 2. Логика ИИ Монстра (Фог преследует Меллостроя)
            const dirToPlayer = new THREE.Vector3().subVectors(player.pos, fogMonster.pos);
            dirToPlayer.y = 0; // Ходит по земле
            const distanceToPlayer = dirToPlayer.length();
            dirToPlayer.normalize();

            // Фог идет прямо на игрока сквозь туман
            fogMonster.pos.addScaledVector(dirToPlayer, fogMonster.speed);
            fogMonster.mesh.position.set(fogMonster.pos.x, fogMonster.height / 2, fogMonster.pos.z);

            // Громкость рычания зависит от расстояния до Фога
            const maxHearDist = 50;
            if(distanceToPlayer < maxHearDist) {
                fogGrowl.volume = (1 - (distanceToPlayer / maxHearDist)) * 0.9;
            } else {
                fogGrowl.volume = 0;
            }

            // Нанесение урона, если Фог вплотную подошел к Меллострою
            if (distanceToPlayer < 2.2) {
                hp -= 0.5; // Наносит периодический урон
                document.getElementById('hp-text').innerText = Math.floor(hp);
                document.getElementById('hp-bar').style.width = hp + '%';

                if (hp <= 0) {
                    // Игрок погиб
                    gameActive = false;
                    document.exitPointerLock();
                    fogGrowl.pause();
                    gameOverScreen.style.display = 'flex';
                    hud.style.display = 'none';
                    crosshair.style.display = 'none';
                }
            }

            // 3. Сбор Яблок (Восстановление жизней на 50%)
            for (let i = apples.length - 1; i >= 0; i--) {
                const apple = apples[i];
                if (scene.children.includes(apple)) {
                    // Вращение яблока для красоты
                    apple.rotation.y += 0.02;

                    const distToApple = player.pos.distanceTo(apple.position);
                    if (distToApple < 1.5) {
                        // Соприкосновение! Извлекаем звук "Ам-ам-ам"
                        amAmSound.currentTime = 0;
                        amAmSound.play().catch(()=>{});

                        // Лечение на 50% от максимального здоровья
                        hp = Math.min(100, hp + 50);
                        document.getElementById('hp-text').innerText = Math.floor(hp);
                        document.getElementById('hp-bar').style.width = hp + '%';

                        // Начисляем очки и удаляем яблоко
                        score++;
                        document.getElementById('score-text').innerText = score;
                        scene.remove(apple);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // Подгонка экрана под изменения размеров окна браузера
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запуск основного игрового процесса
        update();
    </script>
</body>
</html>
