<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МУРИНО: Хоррор</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            user-select: none;
        }

        /* Экран меню */
        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1200') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        h1 {
            color: #ff0000;
            font-size: 70px;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 10px;
            letter-spacing: 10px;
            animation: glitch 1s linear infinite;
        }

        .subtitle {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn {
            padding: 15px 40px;
            background: transparent;
            color: #fff;
            border: 2px solid #ff0000;
            font-size: 22px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 30px #ff0000;
            font-weight: bold;
        }

        /* HUD Игрока */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 5;
            display: none;
        }

        .hud-bar {
            width: 250px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 5px;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: width 0.2s ease;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            z-index: 5;
            display: none;
            text-align: center;
        }

        /* Экран Смерти */
        #gameover-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 12;
            color: #ff0000;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            40% { transform: skew(3deg); }
            60% { transform: skew(-1deg); }
            80% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <h1>МУРИНО</h1>
        <div class="subtitle">Игрок: Меллострой | Монстр: Фог</div>
        <button class="btn" id="start-btn">Войти в туман</button>
    </div>

    <div id="hud">
        <div>Здоровье Меллостроя: <span id="hp-text">100</span>%</div>
        <div class="hud-bar"><div id="hp-fill"></div></div>
    </div>
    <div id="controls-hint">Управление: WASD — ходить | Мышь — обзор (кликни на экран, если пропал прицел)</div>

    <div id="gameover-screen">
        <h1 style="font-size: 50px;">ФОГ НАСТИГ ТЕБЯ</h1>
        <p style="color: #fff;">Меллострой не выжил в заброшенном Мурино...</p>
        <button class="btn" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        // --- НАСТРОЙКИ ССЫЛОК ---
        // Вставь сюда ссылку на свою картинку монстра вместо текущей заглушки (желательно PNG на прозрачном фоне)
        const MONSTER_IMAGE_URL = 'https://i.imgur.com/v8tYvS2.png'; 

        // Звуки по твоим ссылкам (прямые MP3-потоки с MyInstants)
        const soundMenu = new Audio('https://www.myinstants.com/media/sounds/fog-7482.mp3');
        const soundApple = new Audio('https://www.myinstants.com/media/sounds/am-am-am-17903.mp3');
        const soundGrowl = new Audio('https://www.myinstants.com/media/sounds/rychanie-monstra-23449.mp3');

        soundMenu.loop = true;
        soundGrowl.loop = true;

        // --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
        let scene, camera, renderer, clock;
        let player = { hp: 100, speed: 0.15, keys: {} };
        let monster, monsterSpeed = 0.08;
        let apples = [];
        let isPlaying = false;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        // Переменные вращения камеры мышью (упрощенный аналог PointerLock)
        let yaw = 0, pitch = 0;
        const mouseSensitivity = 0.002;

        // Включение музыки в меню при первом клике на страницу (требование браузеров)
        document.body.addEventListener('click', () => {
            if (!isPlaying && soundMenu.paused) {
                soundMenu.play().catch(e => console.log("Музыка ждет взаимодействия"));
            }
        }, { once: true });

        // Старт игры по кнопке
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            soundMenu.pause(); // Выключаем музыку меню
            document.getElementById('menu-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-container').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('controls-hint').style.display = 'block';
                initGame();
            }, 1000);
        });

        function initGame() {
            isPlaying = true;
            clock = new THREE.Clock();

            // Создание сцены и мрачного тумана заброшенного города
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.07);

            // Камера (глаза Меллостроя)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0); // Рост человека

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Освещение: Фонарик игрока
            const flashlight = new THREE.SpotLight(0xffffff, 2, 40, Math.PI / 5, 0.5, 1);
            flashlight.position.set(0, 0, 0);
            camera.add(flashlight);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            // Слабый эмбиент, чтобы город едва читался
            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            // Создание карты заброшенного города
            createMap();

            // Создание монстра (Фог)
            createMonster();

            // Спавн яблок
            spawnApples(25);

            // Запуск рычания Фога
            soundGrowl.volume = 0.6;
            soundGrowl.play().catch(e => console.log(e));

            // Слушатели управления
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            // Активация захвата мыши при клике на экран
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.addEventListener('click', () => {
                if(isPlaying) document.body.requestPointerLock();
            });
            document.addEventListener('mousemove', onMouseMove);

            // Запуск главного цикла
            animate();
        }

        // --- СОЗДАНИЕ ОБЪЕКТОВ ---

        function createMap() {
            // Асфальт
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Генерация серых заброшенных многоэтажек Мурино
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const houseMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });

            for (let i = 0; i < 60; i++) {
                const building = new THREE.Mesh(boxGeo, houseMat);
                
                // Рандомные размеры домов
                const w = Math.random() * 8 + 4;
                const h = Math.random() * 30 + 10;
                const d = Math.random() * 8 + 4;
                building.scale.set(w, h, d);

                // Рандомное расположение (но не прямо на игроке)
                let x = (Math.random() - 0.5) * 160;
                let z = (Math.random() - 0.5) * 160;
                if (Math.abs(x) < 10) x += 15;
                if (Math.abs(z) < 10) z += 15;

                building.position.set(x, h / 2, z);
                scene.add(building);
            }
        }

        function createMonster() {
            // Создаем Фога как Спрайт (он всегда повернут лицом к камере Меллостроя)
            const textureLoader = new THREE.TextureLoader();
            const monsterTex = textureLoader.load(MONSTER_IMAGE_URL);
            
            const monsterMat = new THREE.SpriteMaterial({ map: monsterTex, fog: true });
            monster = new THREE.Sprite(monsterMat);
            
            // Размеры чудовища
            monster.scale.set(4, 5, 1);
            // Спавним поодаль от игрока
            monster.position.set(30, 2.5, -30);
            scene.add(monster);
        }

        function spawnApples(count) {
            const appleGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const appleMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000, roughness: 0.3 });

            for (let i = 0; i < count; i++) {
                const apple = new THREE.Mesh(appleGeo, appleMat);
                const x = (Math.random() - 0.5) * 150;
                const z = (Math.random() - 0.5) * 150;
                apple.position.set(x, 0.3, z);
                scene.add(apple);
                apples.push(apple);
            }
        }

        // --- УПРАВЛЕНИЕ ---

        function onKeyDown(e) {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        }

        function onKeyUp(e) {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        function onMouseMove(e) {
            if (document.pointerLockElement === document.body || document.mozPointerLockElement === document.body) {
                yaw -= e.movementX * mouseSensitivity;
                pitch -= e.movementY * mouseSensitivity;

                // Ограничение взгляда вверх/вниз
                pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));

                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        }

        // --- ИГРОВОЙ ЦИКЛ И ЛОГИКА ---

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // 1. Движение игрока (Меллстроя)
            const changeX = (Number(moveRight) - Number(moveLeft)) * player.speed;
            const changeZ = (Number(moveForward) - Number(moveBackward)) * player.speed;

            // Перемещение относительно взгляда камеры
            camera.translateZ(-changeZ);
            camera.translateX(changeX);
            camera.position.y = 1.6; // Держим уровень глаз неизменным

            // Границы карты, чтобы не убежать в пустоту
            camera.position.x = Math.max(-95, Math.min(95, camera.position.x));
            camera.position.z = Math.max(-95, Math.min(95, camera.position.z));

            // 2. Логика Монстра (Фог преследует Меллостроя)
            const dir = new THREE.Vector3().subVectors(camera.position, monster.position);
            dir.y = 0; // Фог ходит по земле
            const distance = dir.length();
            dir.normalize();

            // Передвижение Фога в сторону игрока
            monster.position.addScaledVector(dir, monsterSpeed);

            // Динамическое изменение громкости рычания в зависимости от расстояния
            let volume = 1 - (distance / 50);
            soundGrowl.volume = Math.max(0, Math.min(1, volume));

            // Атака Фога (если подошел вплотную)
            if (distance < 2.0) {
                player.hp -= 40 * delta; // Быстро отнимает жизни
                if(player.hp < 0) player.hp = 0;
                updateUI();

                if (player.hp <= 0) {
                    gameOver();
                }
            }

            // 3. Проверка сбора яблок
            for (let i = apples.length - 1; i >= 0; i--) {
                const distToApple = camera.position.distanceTo(apples[i].position);
                if (distToApple < 1.5) {
                    // Удаляем яблоко со сцены
                    scene.remove(apples[i]);
                    apples.splice(i, 1);

                    // Воспроизведение звука «Ам-ням-ням»
                    soundApple.currentTime = 0;
                    soundApple.play();

                    // Логика: восстанавливает здоровье ДО 50%
                    // Если у Меллостроя меньше 50% хп, то яблоко восполняет хп, но максимум до 50%.
                    // Если уже 50% или больше, здоровье от яблока не увеличивается.
                    if (player.hp < 50) {
                        player.hp = Math.min(50, player.hp + 20); 
                        updateUI();
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('hp-text').innerText = Math.round(player.hp);
            document.getElementById('hp-fill').style.width = player.hp + '%';
        }

        function gameOver() {
            isPlaying = false;
            soundGrowl.pause();
            document.exitPointerLock();
            document.getElementById('gameover-screen').style.display = 'flex';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
