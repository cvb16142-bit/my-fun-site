<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретный проект</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #00ff00; }
        p { font-size: 1.5rem; }
        .btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,255,0,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background: #00ff00;
            color: #121212;
        }
    </style>
</head>
<body>

    <h1>ДОСТУП РАЗРЕШЕН</h1>
    <p>Вы зашли на самый секретный домен в интернетах.</p>
    <br>
    <button class="btn" onclick="alert('Ахаха, ты кликнул! Прикол удался.')">Нажми сюда</button>

</body>
</html>
